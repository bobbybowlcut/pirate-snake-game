<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pirate Snake</title>

    <!-- PWA / Phone App Setup -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#8b4513" />

    <!-- App Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main id="game-container">

        <!-- REGISTER SCREEN -->
        <section id="register-screen" class="app-screen menu-screen">
            <div class="menu-card">
                <h1>Pirate Snake</h1>
                <h2>Welcome!</h2>
                <p class="helper-text">Enter your pirate name to begin.</p>

                <input
                    id="username-input"
                    type="text"
                    maxlength="12"
                    placeholder="PirateName"
                    autocomplete="off"
                />

                <button id="save-user-btn" type="button">Set Username</button>
            </div>
        </section>

        <!-- MAIN MENU -->
        <section id="menu-screen" class="app-screen menu-screen hidden">
            <div class="menu-card">
                <h1>Pirate Snake</h1>
                <p class="welcome-text">Welcome, <span id="display-username"></span>!</p>

                <button id="start-btn" type="button">Play Game</button>
                <button id="open-board-btn" type="button">Message Board</button>
                <button id="open-leaderboard-btn" type="button">Leaderboard</button>
            </div>
        </section>

        <!-- MESSAGE BOARD -->
        <section id="message-board-screen" class="app-screen menu-screen hidden">
            <div class="menu-card board-card">
                <h2>Message Board</h2>
                <p class="helper-text">Messages older than 72 hours are removed.</p>

                <div id="messages-container"></div>

                <input
                    id="new-message-input"
                    type="text"
                    maxlength="120"
                    placeholder="Type a message..."
                    autocomplete="off"
                />

                <button id="post-message-btn" type="button">Post</button>
                <button id="close-board-btn" type="button">Back to Menu</button>
            </div>
        </section>

        <!-- LEADERBOARD -->
        <section id="leaderboard-screen" class="app-screen menu-screen hidden">
            <div class="menu-card">
                <h2>Top 10 Pirates</h2>

                <ol id="leaderboard-list"></ol>

                <button id="close-leaderboard-btn" type="button">Back to Menu</button>
            </div>
        </section>

        <!-- GAME SCREEN -->
        <section id="game-screen" class="app-screen game-screen hidden">
            <div id="score-display">Score: 0</div>

            <canvas id="game-canvas" width="400" height="400"></canvas>

            <div id="d-pad">
                <div></div>
                <button class="d-btn" data-dir="up" type="button">▲</button>
                <div></div>

                <button class="d-btn" data-dir="left" type="button">◀</button>
                <button class="d-btn" data-dir="down" type="button">▼</button>
                <button class="d-btn" data-dir="right" type="button">▶</button>
            </div>
        </section>

        <!-- GAME OVER SCREEN -->
        <section id="game-over-screen" class="app-screen menu-screen hidden">
            <div class="menu-card">
                <h2>Game Over!</h2>
                <p class="final-score-text">Final Score: <span id="final-score">0</span></p>

                <button id="try-again-btn" type="button">Try Again</button>
                <button id="go-menu-btn" type="button">Menu</button>
            </div>
        </section>

    </main>

    <!-- Firebase Browser-Compatible Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

    <!-- Game Script -->
    <script src="script.js" defer></script>
</body>
</html>
